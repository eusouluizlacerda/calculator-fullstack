version: "3.8"

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/docs', timeout=2)"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s

  frontend:
    build: ./frontend
    ports:
      - "80:8080"
    depends_on:
      backend:
        condition: service_healthy
